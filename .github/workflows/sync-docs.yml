name: Sync Docs from pi-mono

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync docs from pi-mono zh via script
        env:
          PI_MONO_SOURCE_BRANCH: main
          SYNC_BUILD_RETRIES: 3
          SYNC_RETRY_DELAY_SEC: 20
        run: |
          set -euo pipefail
          npm run sync:zh

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -A docs
          if git diff --cached --quiet; then
            echo "No doc changes to commit."
            exit 0
          fi

          git commit -m "docs: sync docs from pi-mono zh"
          git push

      - name: Notify on failure
        if: failure()
        env:
          SYNC_FAILURE_WEBHOOK: ${{ secrets.DOCS_SYNC_WEBHOOK }}
        run: |
          set -euo pipefail
          if [ -n "${SYNC_FAILURE_WEBHOOK:-}" ]; then
            payload="{\"text\":\"⚠️ Docs sync workflow failed\\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\\nBranch: ${GITHUB_REF_NAME}\\nCommit: ${GITHUB_SHA}\"}"
            echo "$payload" | curl -sS -X POST "$SYNC_FAILURE_WEBHOOK" -H 'Content-Type: application/json' -d @- || true
          fi

      - name: Notify on failure (GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = `Docs sync failed on ${context.repo.owner}/${context.repo.repo}\n\n- Workflow: ${context.workflow}\n- Run: ${runUrl}\n- Commit: ${context.sha}\n- Branch: ${context.ref}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `docs-sync: build failed on ${context.runId}`,
              body
            })
