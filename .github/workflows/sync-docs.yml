name: Sync Docs from pi-mono

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout pi-mono
        uses: actions/checkout@v4
        with:
          repository: DaviRain-Su/pi-mono
          path: pi-mono
          fetch-depth: 1

      - name: Sync docs
        run: |
          set -euo pipefail

          SRC="pi-mono/packages/coding-agent/docs/zh"

          # Keep custom dAgent docs route (/dagent/)
          # Add more full pi-mono Chinese docs sections for complete documentation coverage.
          rm -rf docs/guide docs/cookbook docs/patterns docs/platform docs/reference docs/blockchain
          mkdir -p docs/guide docs/cookbook docs/patterns docs/platform docs/reference docs/blockchain

          rsync -av --delete "$SRC/guide/" docs/guide/
          rsync -av --delete "$SRC/cookbook/" docs/cookbook/
          rsync -av --delete "$SRC/patterns/" docs/patterns/
          rsync -av --delete "$SRC/platform/" docs/platform/
          rsync -av --delete "$SRC/reference/" docs/reference/
          rsync -av --delete "$SRC/blockchain/" docs/blockchain/

          # Optional supporting status/readme files
          cp -f "$SRC/BOOK.md" docs/BOOK.md || true
          cp -f "$SRC/SYNC-STATUS.md" docs/SYNC-STATUS.md || true

      - name: Validate docs build
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/guide docs/cookbook docs/patterns docs/platform docs/reference docs/blockchain docs/BOOK.md docs/SYNC-STATUS.md docs/dagent || true
          if git diff --staged --quiet; then
            echo "No doc changes to commit."
            exit 0
          fi
          git commit -m "docs: sync from pi-mono"
          git push
