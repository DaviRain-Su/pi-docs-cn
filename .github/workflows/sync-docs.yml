name: Sync Docs from pi-mono

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Checkout pi-mono
        uses: actions/checkout@v4
        with:
          repository: DaviRain-Su/pi-mono
          path: pi-mono
      
      - name: Copy docs
        run: |
          cp -r pi-mono/packages/coding-agent/docs/zh/blockchain/03-dagent/* docs/dagent/
          rm -f docs/dagent/README.md
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: sync from pi-mono"
          git push
